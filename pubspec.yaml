name: TR
description: "Glasses Shop."

publish_to: "none" 

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Local Database
  hive_flutter: ^1.1.0 

  # Firebase
  firebase_core: ^4.7.0
  cloud_firestore: ^6.3.0
  firebase_storage: ^13.3.0
  
  # State Management
  flutter_bloc: ^9.1.1
  
  # UI & Enhancements
  cached_network_image: ^3.4.1
  google_fonts: ^8.0.2
  flutter_screenutil: ^5.9.3
  flutter_native_splash: ^2.4.7
  shimmer: ^3.0.0
  intl: ^0.20.2  
  
dev_dependencies:
  flutter_test:
    sdk: flutter
  
  #build_runner: ^2.13.1
  #json_serializable: ^6.13.1
  #json_annotation: ^4.11.0
  flutter_launcher_icons: ^0.14.4

flutter:
  
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_logo.png"
  adaptive_icon_foreground: "assets/images/app_logo.png"

 